services:
  pilotrh:
    build: .
    container_name: pilotrh
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data                          # persistance : SQLite + photos + documents
      # --- Synchronisation auto depuis le partage réseau de la pointeuse ---
      # 1) montez d'abord le partage sur l'hôte (voir README §3a)
      # 2) décommentez la ligne suivante :
      # - /mnt/pointeuse:/mnt/pointeuse:ro
    environment:
      - PILOTRH_ADMIN_PASSWORD=${PILOTRH_ADMIN_PASSWORD:-}  # protège l'admin (obligatoire si public)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}   # optionnel : OCR + assistant IA
      # - PILOTRH_MDB_PATH=/mnt/pointeuse/attBackup.mdb   # active la lecture auto du .mdb
      # - PILOTRH_SYNC_MINUTES=60
    restart: unless-stopped

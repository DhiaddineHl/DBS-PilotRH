<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PilotRH — Gestion RH intelligente · Industrie textile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --ink:#1a1d29; --ink-2:#232838; --ink-3:#2e3447;
  --ivory:#f6f3ec; --surface:#ffffff; --surface-2:#fbf9f4;
  --gold:#c19a3e; --gold-soft:#e9dcb6; --gold-line:#d8c489;
  --thread:#b1432d;
  --text:#1f2330; --muted:#6c7180; --faint:#9aa0ad;
  --line:#e7e1d4; --line-2:#efebe0;
  --present:#2f8f5b; --present-bg:#e6f3ec;
  --late:#c9871f; --late-bg:#fbf0d9;
  --absent:#bf3f2b; --absent-bg:#f9e4df;
  --leave:#4f66c2; --leave-bg:#e7ebfa;
  --mission:#7d5fa8; --mission-bg:#efe8f6;
  --radius:14px; --radius-sm:9px;
  --shadow:0 1px 2px rgba(26,29,41,.04),0 8px 24px -12px rgba(26,29,41,.12);
  --shadow-lg:0 24px 60px -20px rgba(26,29,41,.32);
  --sans:'Inter',system-ui,sans-serif;
  --display:'Fraunces',Georgia,serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--ivory);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
a{color:inherit}
::selection{background:var(--gold-soft)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cfc9bb;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}

/* Sidebar */
.side{background:var(--ink);color:#cdd1dc;display:flex;flex-direction:column;overflow:hidden}
.brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.brand .mark{display:flex;align-items:center;gap:11px}
.brand .glyph{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--gold),#9d7a2c);display:grid;place-items:center;flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.brand .glyph svg{width:19px;height:19px}
.brand .name{font-family:var(--display);font-weight:600;font-size:19px;color:#fff;letter-spacing:.2px;line-height:1}
.brand .sub{font-size:10.5px;color:#8087a0;letter-spacing:.14em;text-transform:uppercase;margin-top:4px}
.nav{flex:1;overflow-y:auto;padding:12px 12px 18px}
.nav-group{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#6a718c;padding:14px 12px 7px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;padding:9px 12px;border-radius:9px;color:#aeb4c6;font-size:13.5px;font-weight:500;position:relative;transition:.15s;text-align:left}
.nav-item svg{width:17px;height:17px;flex:none;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.05);color:#e7eaf2}
.nav-item.active{background:var(--ink-3);color:#fff}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:3px;background:repeating-linear-gradient(180deg,var(--gold) 0 4px,transparent 4px 7px)}
.nav-item .pill{margin-left:auto;font-size:10.5px;background:var(--thread);color:#fff;border-radius:20px;padding:1px 7px;font-weight:600;font-family:var(--mono)}
.nav-item.active .pill{background:var(--gold)}
.side-foot{padding:14px;border-top:1px solid rgba(255,255,255,.06)}
.role-box{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;background:rgba(255,255,255,.04)}
.role-box .av{width:30px;height:30px;border-radius:8px;background:var(--gold);color:var(--ink);display:grid;place-items:center;font-weight:700;font-size:12px;flex:none}
.role-box .who{font-size:12.5px;color:#e7eaf2;font-weight:600;line-height:1.2}
.role-box .who small{display:block;font-weight:400;color:#8087a0;font-size:10.5px;margin-top:1px}

/* Main */
.main{overflow-y:auto;position:relative}
.topbar{position:sticky;top:0;z-index:30;background:rgba(246,243,236,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:15px 30px;display:flex;align-items:center;gap:18px}
.topbar h1{font-family:var(--display);font-weight:600;font-size:21px;letter-spacing:.1px}
.topbar .crumb{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:2px}
.topbar .spacer{flex:1}
.searchbox{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 12px;width:240px}
.searchbox input{border:none;outline:none;background:none;width:100%}
.searchbox svg{width:15px;height:15px;color:var(--faint)}
.date-chip{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 12px;white-space:nowrap}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;position:relative}
.icon-btn svg{width:17px;height:17px;color:var(--muted)}
.icon-btn .dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--thread);box-shadow:0 0 0 2px var(--ivory)}
.page{padding:26px 30px 60px;max-width:1320px}
.view{display:none}
.view.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Generic bits */
.eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600}
.section-h{display:flex;align-items:flex-end;gap:14px;margin:6px 0 18px}
.section-h h2{font-family:var(--display);font-size:24px;font-weight:600}
.section-h .seam{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--gold-line) 0 7px,transparent 7px 13px);opacity:.6;margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:10px;font-weight:600;font-size:13px;transition:.15s;border:1px solid transparent;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--ink-2)}
.btn-gold{background:var(--gold);color:#241c06}
.btn-gold:hover{background:#ab882f}
.btn-ghost{background:var(--surface);border-color:var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--gold-line);background:var(--surface-2)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.t-present{background:var(--present-bg);color:var(--present)}
.t-late{background:var(--late-bg);color:var(--late)}
.t-absent{background:var(--absent-bg);color:var(--absent)}
.t-leave{background:var(--leave-bg);color:var(--leave)}
.t-mission{background:var(--mission-bg);color:var(--mission)}
.t-neutral{background:#eee9dd;color:var(--muted)}
.dotmark{width:7px;height:7px;border-radius:50%;display:inline-block}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;position:relative;overflow:hidden}
.kpi .lab{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.kpi .val{font-family:var(--display);font-size:30px;font-weight:600;margin-top:7px;line-height:1}
.kpi .sub{font-size:11px;color:var(--faint);margin-top:5px}
.kpi .ic{position:absolute;top:13px;right:13px;width:30px;height:30px;border-radius:9px;display:grid;place-items:center}
.kpi .ic svg{width:16px;height:16px}

/* Tables */
.tablecard{overflow:hidden}
.table-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--line)}
.table-head h3{font-size:15px;font-weight:700}
.table-head .spacer{flex:1}
table.tbl{width:100%;border-collapse:collapse}
table.tbl th{text-align:left;font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:11px 18px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
table.tbl th:hover{color:var(--gold)}
table.tbl th .arr{opacity:.4;font-size:9px}
table.tbl td{padding:12px 18px;border-bottom:1px solid var(--line-2);font-size:13px;vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr{transition:background .12s}
table.tbl tbody tr:hover{background:var(--surface-2)}
.emp-cell{display:flex;align-items:center;gap:10px}
.emp-cell .ava{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;flex:none}
.emp-cell b{font-weight:600;font-size:13px}
.emp-cell small{display:block;color:var(--muted);font-size:11px}
.mono{font-family:var(--mono)}
.linkish{color:var(--gold);font-weight:600;cursor:pointer}
.linkish:hover{text-decoration:underline}

/* Filter bar */
.filterbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:16px}
.field{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:7px 11px}
.field svg{width:15px;height:15px;color:var(--faint)}
.field input,.field select{border:none;outline:none;background:none;font-size:13px;min-width:120px}
.field label{font-size:11px;color:var(--muted);font-weight:600}

/* Two-col layouts */
.split{display:grid;grid-template-columns:1.6fr 1fr;gap:16px}
.chartcard{padding:16px 18px 18px}
.chartcard h3{font-size:14px;font-weight:700;margin-bottom:2px}
.chartcard .csub{font-size:11.5px;color:var(--muted);margin-bottom:12px}
.chart-wrap{position:relative;height:240px}
.chart-wrap.sm{height:200px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(26,29,41,.5);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:760px;box-shadow:var(--shadow-lg);animation:pop .24s ease;overflow:hidden}
.modal.wide{max-width:920px}
.modal.narrow{max-width:520px}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
.modal-head h3{font-family:var(--display);font-size:20px;font-weight:600}
.modal-head .x{margin-left:auto;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted)}
.modal-head .x:hover{background:var(--surface-2);color:var(--text)}
.modal-body{padding:22px 24px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2)}

/* Employee profile */
.profile-top{display:flex;gap:18px;align-items:center;margin-bottom:20px}
.profile-top .big-av{width:74px;height:74px;border-radius:16px;display:grid;place-items:center;font-weight:700;font-size:26px;color:#fff;flex:none}
.profile-top h2{font-family:var(--display);font-size:24px;font-weight:600}
.profile-top .meta{color:var(--muted);font-size:13px;margin-top:3px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 26px}
.info-block{margin-bottom:18px}
.info-block h4{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px;padding-bottom:7px;border-bottom:1px dashed var(--gold-line)}
.info-row{display:flex;justify-content:space-between;gap:14px;padding:5px 0;font-size:13px}
.info-row span{color:var(--muted)}
.info-row b{font-weight:600;text-align:right}
.doc-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12px;margin:0 7px 7px 0}
.doc-chip svg{width:14px;height:14px;color:var(--gold)}

/* Alerts */
.alert-row{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line-2)}
.alert-row:last-child{border-bottom:none}
.alert-row .ai{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}
.alert-row .ai svg{width:17px;height:17px}
.alert-row .txt b{font-weight:600;font-size:13.5px}
.alert-row .txt small{display:block;color:var(--muted);font-size:12px;margin-top:1px}
.alert-row .when{margin-left:auto;font-size:11.5px;color:var(--faint);font-family:var(--mono);white-space:nowrap}

/* Import dropzone */
.dropzone{border:2px dashed var(--gold-line);border-radius:16px;background:var(--surface-2);padding:40px;text-align:center;transition:.18s}
.dropzone.drag{background:var(--gold-soft);border-color:var(--gold)}
.dropzone .dz-ic{width:54px;height:54px;border-radius:14px;background:var(--gold-soft);display:grid;place-items:center;margin:0 auto 14px}
.dropzone .dz-ic svg{width:26px;height:26px;color:var(--gold)}
.dropzone h3{font-family:var(--display);font-size:19px;font-weight:600;margin-bottom:5px}
.dropzone p{color:var(--muted);font-size:13px;margin-bottom:16px}

/* AI assistant */
.ai-wrap{display:grid;grid-template-columns:1fr;gap:0;height:calc(100vh - 220px);min-height:440px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.ai-stream{flex:1;overflow-y:auto;padding:22px 24px}
.ai-msg{display:flex;gap:12px;margin-bottom:18px;max-width:760px}
.ai-msg .b-av{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none;font-weight:700;font-size:12px}
.ai-msg.user{margin-left:auto;flex-direction:row-reverse}
.ai-msg.user .b-av{background:var(--ink);color:#fff}
.ai-msg.bot .b-av{background:linear-gradient(150deg,var(--gold),#9d7a2c);color:#241c06}
.ai-bubble{background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:12px 15px;font-size:13.5px;line-height:1.55}
.ai-msg.user .ai-bubble{background:var(--ink);color:#eef0f6;border-color:transparent}
.ai-bubble p{margin:0 0 8px}.ai-bubble p:last-child{margin:0}
.ai-bubble strong{font-weight:600}
.ai-bubble ul{margin:6px 0 6px 18px}
.ai-input{border-top:1px solid var(--line);padding:14px 18px;display:flex;gap:10px;align-items:flex-end;background:var(--surface)}
.ai-input textarea{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 13px;resize:none;outline:none;max-height:120px;background:var(--surface-2)}
.ai-input textarea:focus{border-color:var(--gold-line)}
.suggest{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.suggest button{font-size:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:7px 13px;color:var(--text);font-weight:500;transition:.15s}
.suggest button:hover{border-color:var(--gold-line);background:var(--gold-soft)}
.typing{display:inline-flex;gap:4px;align-items:center}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:bnce 1s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes bnce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

/* RSE */
.rse-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.rse-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative}
.rse-card .rl{font-size:11.5px;color:var(--muted);font-weight:600}
.rse-card .rv{font-family:var(--display);font-size:32px;font-weight:600;margin:8px 0 4px}
.rse-card .rb{height:6px;border-radius:6px;background:var(--line);overflow:hidden;margin-top:8px}
.rse-card .rb i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold),var(--gold-line))}
.progress-note{font-size:11px;color:var(--faint);margin-top:6px}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:13px 17px;border-radius:12px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:slidein .3s ease;max-width:340px}
.toast svg{width:17px;height:17px;flex:none}
.toast.ok svg{color:#5fd49a}.toast.warn svg{color:var(--gold)}
@keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* OCR result */
.ocr-line{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13px}
.ocr-line span{color:var(--muted)}.ocr-line b{font-weight:600}
.scan-anim{height:4px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:4px;animation:scan 1.3s linear infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty svg{width:40px;height:40px;color:var(--gold-line);margin-bottom:12px}
.mini-bar{display:flex;gap:3px;align-items:flex-end;height:30px}
.mini-bar i{flex:1;background:var(--gold-soft);border-radius:2px;min-height:3px}

@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.rse-grid{grid-template-columns:repeat(2,1fr)}.split{grid-template-columns:1fr}}
@media(max-width:860px){.app{grid-template-columns:1fr}.side{display:none}.page{padding:18px}.kpis{grid-template-columns:repeat(2,1fr)}.info-grid{grid-template-columns:1fr}.searchbox{display:none}}
/* Day navigation + segments */
.daynav{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:5px}
.daynav button{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
.daynav button:hover{background:var(--surface-2);color:var(--text)}
.daynav input[type=date]{border:none;outline:none;background:none;font-weight:600;font-family:var(--mono);font-size:13px;padding:0 4px}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:6px 13px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.tinput{border:1px solid var(--line);border-radius:7px;padding:5px 7px;font-family:var(--mono);font-size:12.5px;width:84px;outline:none;background:var(--surface)}
.tinput:focus{border-color:var(--gold-line)}
.ssel{border:1px solid var(--line);border-radius:7px;padding:5px 7px;font-size:12px;outline:none;background:var(--surface)}
.cat-tag{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px}
.cat-ouv{background:#eef3e9;color:#5a6b2f}.cat-cad{background:#efe8f6;color:var(--mission)}
.rep-tot td{background:var(--surface-2);font-weight:700;border-top:2px solid var(--line)}
.hist-line{display:grid;grid-template-columns:90px 1fr auto;gap:12px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line);font-size:12.5px}
.hist-line .hd{font-family:var(--mono);color:var(--muted)}
.range-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:16px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="overlay" id="overlay"></div>
<div class="toast-wrap" id="toasts"></div>
<script>
/* ============================================================
   PilotRH v2 — RH intelligente · Industrie textile · DBS Fashion
   Pointage journalier + paramètres horaires + rapports paie

/* génère un pointage par jour ouvré entre deux dates */
function genPointages(emps,s){
  const out={};
  const start=new Date('2026-05-01T12:00'), end=new Date(TODAY+'T12:00');
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    if(d.getDay()===0) continue;            // dimanche repos
    const ds=isoOf(d);
    if(ds===TODAY) continue;                // aujourd'hui = jeu de démo dédié
    const rec={};
    emps.forEach(e=>{
      const r=hash(ds+e.id)%100;
      if(r<4){rec[e.id]={statut:'absent',entree:'',sortie:''}; return}
      if(r<7){rec[e.id]={statut:'leave',entree:'',sortie:''}; return}
      let em=toMin(s.heureEntree)+((hash(ds+e.id+'in')%9)-3);     // -3..+5
      if(r>=85) em=toMin(s.heureEntree)+12+(hash(ds+e.id+'l')%30); // ~15% en retard
      let om=toMin(s.heureSortie)+((hash(ds+e.id+'out')%7)-2);
      if(r>=78) om=toMin(s.heureSortie)+25+(hash(ds+e.id+'hs')%70); // heures sup
      rec[e.id]={statut:'present',entree:fromMin(em),sortie:fromMin(om)};
    });
    out[ds]=rec;
  }
  out[TODAY]=showcaseDay();
  return out;
}

/* métriques dérivées selon paramètres horaires */
function roundMin(x,step,sens){if(!step||step<=0)return x;return sens==='inferieur'?Math.floor(x/step)*step:Math.round(x/step)*step;}
function badges(rec){
  let P=(rec.punches&&rec.punches.length)?rec.punches.slice():[rec.entree,rec.sortie];
  return P.map(toMin).filter(x=>x!=null).sort((a,b)=>a-b);
}
function metrics(rec,date){
  const reg=regimeFor(date||TODAY);
  if(!rec||rec.statut==='absent')return{statut:'absent',worked:false,heures:0,retard:0,hs:0,late:false};
  if(['leave','mission'].includes(rec.statut)&&!rec.entree)return{statut:rec.statut,worked:false,heures:0,retard:0,hs:0,late:false};
  const P=badges(rec);
  let heures=0,retard=0,hs=0,late=false,coupures=false,revue=false;
  if(P.length){
    const firstIn=P[0],lastOut=P[P.length-1];
    if(reg.actif===false){
      hs=Math.max(0,lastOut-firstIn-(+reg.pause||0));
    } else {
      const debut=toMin(reg.debut),fin=toMin(reg.fin),grace=+reg.grace||0,tol=+reg.tol||0,pause=+reg.pause||0;
      late=firstIn>debut+tol; retard=late?(firstIn-debut):0;
      if(P.length>=2){
        let segs=[];
        if(P.length%2===0){for(let i=0;i+1<P.length;i+=2)segs.push([P[i],P[i+1]]);coupures=P.length>2;}
        else{segs=[[firstIn,lastOut]];revue=true;}              // badges impairs (oubli) : entrée/sortie simple, à vérifier
        let norm=0;for(const s of segs){const a=Math.max(s[0],debut),b=Math.min(s[1],fin);if(b>a)norm+=b-a;}
        let gaps=0;for(let i=0;i+1<segs.length;i++){const g0=Math.max(segs[i][1],debut),g1=Math.min(segs[i+1][0],fin);if(g1>g0)gaps+=g1-g0;}
        norm-=Math.max(0,pause-gaps);
        heures=Math.max(0,norm);
        if(lastOut>=fin+grace){hs=(S().modeHS==='fin')?(lastOut-fin):(lastOut-(fin+grace));} hs=Math.max(0,hs);
      }
    }
  }
  const ar=+S().arrondi||0; if(ar>0){heures=roundMin(heures,ar,S().arrondiSens);hs=roundMin(hs,ar,S().arrondiSens);}
  let manuel=false;
  if(rec.hM!=null&&rec.hM!==''){heures=+rec.hM;manuel=true;}
  let statut=rec.statut==='present'?(late?'late':'present'):rec.statut;
  return{statut,worked:true,heures,retard,hs,late,manuel,coupures,revue};
}

function fillPres(){
  const f=($('#fStatut')||{}).value||'',sv=($('#fServ')||{}).value||'',at=($('#fAtel')||{}).value||'',q=(($('#fQ')||{}).value||'').toLowerCase();
  const r=dayRec(PRES_DATE)||{};
  let rows=DB.employees.map(e=>({e,rec:r[e.id]||{statut:'absent',entree:'',sortie:''},m:metrics(r[e.id],PRES_DATE)}))
    .filter(x=>(!f||x.m.statut===f)&&(!sv||x.e.service===sv)&&(!at||x.e.atelier===at)&&(!q||(x.e.prenom+' '+x.e.nom).toLowerCase().includes(q)));
  if(SORT.pres){const s=SORT.pres;rows=[...rows].sort((a,b)=>{let va,vb;
    if(s.k==='name'){va=a.e.nom;vb=b.e.nom}else if(s.k==='in'){va=a.rec.entree||'99';vb=b.rec.entree||'99'}
    else if(s.k==='h'){va=a.m.heures;vb=b.m.heures}else if(s.k==='ret'){va=a.m.retard;vb=b.m.retard}else{va=a.m.hs;vb=b.m.hs}
    return(va>vb?1:va<vb?-1:0)*s.dir});}
  $('#presBody').innerHTML=rows.map(x=>{
    const {e,rec,m}=x;
    const opts=['present','absent','leave','mission','autorisation'].map(o=>`<option value="${o}" ${rec.statut===o?'selected':''}>${{present:'Présente',absent:'Absente',leave:'Congé',mission:'Mission',autorisation:'Autorisation'}[o]}</option>`).join('');

      <td>${showTimes?`<input class="tinput" type="time" value="${rec.sortie||''}" onchange="editPres('${e.id}','sortie',this.value)">${(rec.punches&&rec.punches.length>2)?(rec.punches.length%2===0?` <span class="tag" style="background:var(--gold-soft);color:var(--gold);cursor:help" title="Badges : ${rec.punches.join(' · ')} — coupure(s) déduite(s)">\u21c4 ${rec.punches.length}</span>`:` <span class="tag t-late" style="cursor:help" title="Badges impairs (oubli de pointage) : ${rec.punches.join(' · ')} — calculé en entrée/sortie simple, à vérifier">\u26a0 ${rec.punches.length}</span>`):''}`:'<span style="color:var(--faint)">—</span>'}</td>
      <td>${(rec.statut==='present'||rec.statut==='autorisation'||(rec.hM!=null&&rec.hM!==''))?`<input class="tinput" style="width:60px;text-align:center" value="${m.heures?fr2(hDec(m.heures)):''}" title="Heures travaillées — modifiable (laisser vide = calcul auto)" onchange="editHeures('${e.id}',this.value)">${m.manuel?` <span title="Saisie manuelle" style="color:var(--gold)">✎</span>`:''}`:(m.worked&&m.heures?'<b>'+hLabel(m.heures)+'</b>':'—')}</td>
      <td>${m.retard?'<b style="color:var(--late)">+'+m.retard+' min</b>':'—'}</td>
      <td>${m.hs?'<b style="color:var(--mission)">'+hLabel(m.hs)+'</b>':'—'}</td>
    </tr>`;
  }).join('');

function editPres(id,field,val){
  if(!can('edit')){toast('Compte en lecture seule','warn');fillPres();return;}
  if(!DB.pointages[PRES_DATE])DB.pointages[PRES_DATE]={};
  if(!DB.pointages[PRES_DATE][id])DB.pointages[PRES_DATE][id]={statut:'absent',entree:'',sortie:''};
  const rec=DB.pointages[PRES_DATE][id];
  rec[field]=val;
  if((field==='entree'||field==='sortie')&&rec.punches)delete rec.punches;   // saisie manuelle : on abandonne les badges intermédiaires
  if(field==='statut'&&val==='absent'){rec.entree='';rec.sortie='';delete rec.punches;delete rec.hM}
  if(field==='statut'&&(val==='present')&&!rec.entree){const rg=regimeFor(PRES_DATE);rec.entree=rg.debut||'07:30';rec.sortie=rg.fin||'16:30'}
  persistPointage(PRES_DATE,id);fillPres();
}
function editHeures(id,val){
  if(!DB.pointages[PRES_DATE])DB.pointages[PRES_DATE]={};
  if(!DB.pointages[PRES_DATE][id])DB.pointages[PRES_DATE][id]={statut:'present',entree:'',sortie:''};
  const rec=DB.pointages[PRES_DATE][id];const v=String(val).trim().replace(',','.');
  if(v===''){delete rec.hM;}
  else{let mins;if(v.indexOf('h')>=0){const p=v.split('h');mins=(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}else{mins=Math.round(parseFloat(v)*60);}if(isNaN(mins)||mins<0)mins=0;rec.hM=mins;}
  persistPointage(PRES_DATE,id);fillPres();toast(v===''?'Heures remises en calcul automatique':'Heures saisies manuellement');
}
function createDay(){
  const rg=regimeFor(PRES_DATE);const rec={};DB.employees.forEach(e=>{if(e.actif)rec[e.id]={statut:'present',entree:rg.debut||'07:30',sortie:rg.fin||'16:30'}});

function dropFile(e){e.preventDefault();$('#dz').classList.remove('drag');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])}
function normName(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim()}
function findEmp(matricule,nom){
  let e=DB.employees.find(x=>x.cin===matricule||x.matricule===matricule||x.id===matricule);
  if(e)return e;
  const n=normName(nom);
  return DB.employees.find(x=>normName(x.prenom+' '+x.nom)===n||normName(x.nom+' '+x.prenom)===n);
}
function normDate(s){ // accepte YYYY-MM-DD, DD/MM/YYYY, "YYYY-MM-DD HH:MM:SS"
  if(!s)return '';s=s.trim();
  let m=s.match(/(\d{4})-(\d{2})-(\d{2})/);if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/(\d{2})\/(\d{2})\/(\d{4})/);if(m)return m[3]+'-'+m[2]+'-'+m[1];
  return '';
}
function normTime(s){if(!s)return '';const m=s.match(/(\d{1,2}):(\d{2})/);return m?pad(+m[1])+':'+m[2]:''}
function handleFile(f){
  if(!f)return;
  if(f.name.endsWith('.mdb')){importMdb(f);return}
  if(f.name.endsWith('.xlsx')){toast('Excel reçu — démonstration en mode CSV','warn');simulateImport();return}
  const r=new FileReader();
  r.onload=ev=>{
    const lines=ev.target.result.split(/\r?\n/).filter(l=>l.trim());
    let matched=0,late=0,miss=0;const touched=new Set();
    lines.forEach((l,idx)=>{
      if(idx===0&&/matricule|cin|nom|badge/i.test(l)&&!/\d{2}:\d{2}/.test(l))return;
      const p=l.split(/[;,\t]/).map(x=>x.trim());
      // colonnes : matricule ; nom ; date ; entrée ; sortie
      const e=findEmp(p[0],p[1]);if(!e)return;
      const date=normDate(p[2])||PRES_DATE;
      const entree=normTime(p[3]),sortie=normTime(p[4]);
      if(!DB.pointages[date])DB.pointages[date]={};
      touched.add(date);matched++;
      if(!entree){DB.pointages[date][e.id]={statut:'absent',entree:'',sortie:''};miss++}
      else{const rec={statut:'present',entree,sortie:sortie||entree};DB.pointages[date][e.id]=rec;if(metrics(rec).late)late++}
    });
    // les employées sans ligne ce(s) jour(s) = absentes
    touched.forEach(date=>{DB.employees.forEach(e=>{if(e.actif&&!DB.pointages[date][e.id])DB.pointages[date][e.id]={statut:'absent',entree:'',sortie:''}})});
    if(touched.size){const ds=[...touched].sort();PRES_DATE=ds[ds.length-1]}
    persistAll();closeModal();renderPresences($('#main'));
    toast(matched+' pointages sur '+touched.size+' jour(s) · '+late+' retard(s), '+miss+' oubli(s)');
  };
  r.readAsText(f);
}

function genOneDay(ds){const rec={};const s=S();DB.employees.forEach(e=>{const r=hash(ds+e.id)%100;
  if(r<5){rec[e.id]={statut:'absent',entree:'',sortie:''};return}
  let em=toMin(s.heureDebut)+((hash(ds+e.id)%9)-3);if(r>=85)em+=15;

function monthBounds(ym){const[y,mo]=ym.split('-').map(Number);return[ym+'-01',isoOf(new Date(y,mo,0))]}
function eachDay(a,b,fn){for(let d=new Date(a+'T12:00');d<=new Date(b+'T12:00');d.setDate(d.getDate()+1))fn(isoOf(d))}
function summarize(a,b){
  return DB.employees.map(e=>{
    let jT=0,jA=0,jC=0,hN=0,hS=0,ret=0,rt=0;
    eachDay(a,b,ds=>{const rec=dayRec(ds);if(!rec||!rec[e.id])return;const m=metrics(rec[e.id],ds);
      if(m.statut==='absent'){jA++}else if(m.statut==='leave'){jC++}
      else{jT++;if(m.worked){hN+=m.heures;hS+=m.hs;ret+=m.retard;if(m.late)rt++}}});
    return{e,jT,jA,jC,hN,hS,ret,rt};
  });
}

function fillHist(id){
  const a=$('#hFrom').value,b=$('#hTo').value;const lines=[];
  eachDay(a,b,ds=>{const rec=dayRec(ds);if(!rec||!rec[id])return;const m=metrics(rec[id],ds);const r=rec[id];
    let detail;
    if(m.statut==='absent')detail='<span class="tag t-absent">Absente</span>';
    else if(m.statut==='leave')detail='<span class="tag t-leave">Congé</span>';
    else if(m.statut==='mission')detail='<span class="tag t-mission">Mission</span>';
    else detail=`${r.entree||'—'} → ${r.sortie||'—'} · <b>${hLabel(m.heures)}</b>${m.late?' · <span style="color:var(--late)">+'+m.retard+'min</span>':''}${m.hs?' · <span style="color:var(--mission)">'+hLabel(m.hs)+' sup</span>':''}`;
    lines.push(`<div class="hist-line"><span class="hd">${fmtDate(ds)}</span><span>${detail}</span><span>${statutTag(m.statut)}</span></div>`);
  });
  $('#histBox').innerHTML=lines.reverse().slice(0,40).join('')||'<div style="color:var(--muted);font-size:13px;padding:8px 0">Aucun pointage sur la période.</div>';
}

function saveEditEmp(id){
  const e=emp(id),g=k=>($('#ed_'+k)||{}).value;
  ['prenom','nom','cin','matricule','tel','email','poste','categorie','service','atelier','contrat','famille','responsable','adresse','niveau'].forEach(k=>{const v=g(k);if(v!==undefined&&v!=='')e[k]=v;});
  e.salaire=+g('salaire')||e.salaire;e.enfants=+g('enfants')||0;
  if(g('naissance'))e.naissance=g('naissance');if(g('embauche'))e.embauche=g('embauche');

function fillDoc(){const q=($('#dSearch')||{}).value?.toLowerCase()||'';const rows=DB.documents.filter(d=>(empName(d.id)+' '+d.type).toLowerCase().includes(q));
  $('#docBody').innerHTML=rows.map(d=>`<tr><td>${empCell(d.id)}</td><td><b>${d.type}</b><small style="display:block;color:var(--muted);font-size:11px">${d.resume}</small></td><td class="mono">${fmtDate(d.date)}</td><td><span class="tag ${d.source==='IA'?'t-leave':'t-neutral'}">${d.source==='IA'?'Lu par IA':'Manuel'}</span></td><td><span class="linkish" onclick="openProfile('${d.id}')">Dossier →</span></td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">Aucun document</div></td></tr>';
}
function openOCR(){
  openModal(`<div class="modal-head">${I.spark}<h3>Numériser & analyser</h3><button class="x" onclick="closeModal()">${I.x}</button></div>
  <div class="modal-body" id="ocrBody"><div class="dropzone" id="ocrDz" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="ocrDrop(event)">
    <div class="dz-ic">${I.doc}</div><h3>Déposez une photo ou un PDF</h3><p>Certificat · contrat · CIN · diplôme</p>
    <input type="file" id="ocrInput" accept="image/*,.pdf" style="display:none" onchange="ocrPick(this.files[0])">
    <button class="btn btn-primary" onclick="document.getElementById('ocrInput').click()">${I.up} Choisir un fichier</button></div>
    <div style="text-align:center;margin-top:14px"><button class="btn btn-ghost" onclick="ocrDemo()">${I.spark} Démonstration</button></div></div>`,'narrow');
}
function ocrDrop(e){e.preventDefault();$('#ocrDz').classList.remove('drag');if(e.dataTransfer.files[0])ocrPick(e.dataTransfer.files[0])}
function ocrPick(f){if(f)runOCR(f)}
async function runOCR(file){
  $('#ocrBody').innerHTML=`<div style="text-align:center;padding:30px 10px"><div class="dz-ic" style="margin:0 auto 16px;background:var(--gold-soft)">${I.spark}</div><h3 style="font-family:var(--display);font-size:18px">Analyse en cours…</h3><p style="color:var(--muted);margin:8px 0 18px">Lecture OCR · extraction des informations</p><div class="scan-anim"></div></div>`;
  try{
    const fd=new FormData();fd.append('file',file);fd.append('names',DB.employees.map(e=>e.prenom+' '+e.nom).join(', '));
    const r=await fetch('/api/ocr',{method:'POST',body:fd});if(!r.ok)throw new Error('OCR '+r.status);
    const data=parseJSON((await r.json()).text);showOCR(data,true);
  }catch(err){showOCR({type:'Document',nom:'',resume:'Lecture impossible (clé API requise hors Claude). Classez manuellement.',date_debut:'',date_fin:'',employee_match:''},false,err.message)}
}
function ocrDemo(){showOCR({type:'Certificat médical',nom:'Ines Gharbi',date_debut:'2026-06-19',date_fin:'2026-06-21',resume:'Arrêt de 3 jours — Dr. Slim Ouni',employee_match:'Ines Gharbi'},true)}
function showOCR(d,ok,err){
  const match=DB.employees.find(e=>(e.prenom+' '+e.nom)===d.employee_match)||DB.employees.find(e=>d.nom&&(e.prenom+' '+e.nom).toLowerCase().includes((d.nom||'').toLowerCase().split(' ')[0]));
  window._ocr={d,matchId:match?match.id:''};
  $('#ocrBody').innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><span class="tag ${ok?'t-present':'t-late'}">${ok?'Analyse réussie':'Analyse partielle'}</span><span style="font-size:12px;color:var(--muted)">${err||'Informations extraites'}</span></div>
    <div class="ocr-line"><span>Type</span><b>${d.type||'—'}</b></div><div class="ocr-line"><span>Nom détecté</span><b>${d.nom||'—'}</b></div>
    ${d.date_debut?`<div class="ocr-line"><span>Début</span><b>${fmtDate(d.date_debut)}</b></div>`:''}${d.date_fin?`<div class="ocr-line"><span>Fin</span><b>${fmtDate(d.date_fin)}</b></div>`:''}
    <div class="ocr-line"><span>Résumé</span><b style="max-width:60%;text-align:right">${d.resume||'—'}</b></div>
    <div class="ocr-line"><span>Employée</span><b>${match?(match.prenom+' '+match.nom):'<span style="color:var(--late)">Non identifié</span>'}</b></div>
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-ghost" onclick="closeModal()">Annuler</button><button class="btn btn-gold" onclick="confirmOCR()">${I.check} Classer</button></div>`;
}
function confirmOCR(){
  const{d,matchId}=window._ocr||{};if(!matchId){toast('Aucune employée associée','warn');return}
  DB.documents.unshift({docId:'D'+pad(DB.documents.length+1),id:matchId,type:d.type,date:d.date_debut||TODAY,resume:d.resume||'Document numérisé',source:'IA'});
  if(d.type==='Certificat médical'&&d.date_debut){const j=d.date_fin?Math.round((new Date(d.date_fin)-new Date(d.date_debut))/864e5)+1:1;
    DB.absences.unshift({id:matchId,type:'Maladie',debut:d.date_debut,fin:d.date_fin||d.date_debut,jours:j,statut:'justifiée',note:'Certificat lu par IA'});
    if(DB.pointages[TODAY]&&d.date_debut===TODAY)DB.pointages[TODAY][matchId]={statut:'absent',entree:'',sortie:''};
    toast('Certificat classé · absence justifiée ('+j+'j)');}
  else toast('Document classé · '+empName(matchId));
  save();if(matchId&&DB.pointages[TODAY]&&DB.pointages[TODAY][matchId])persistPointage(TODAY,matchId);closeModal();go('documents');
}

function setAbsRange(){ABS_FROM=$('#abFrom').value;ABS_TO=$('#abTo').value;go('absences');}
function lastPresence(id){let best='';for(const ds in DB.pointages){if(ds>TODAY)continue;const r=DB.pointages[ds][id];if(r&&(r.statut==='present'||r.statut==='late')){if(ds>best)best=ds;}}return best;}
function absStreak(id){let days=0,start='';const d=new Date(TODAY+'T12:00');for(let k=0;k<200;k++){const ds=isoOf(d);const reg=regimeFor(ds);if(reg.actif!==false){const r=(DB.pointages[ds]||{})[id];const m=metrics(r,ds);if(m.statut==='present'||m.statut==='late'||m.statut==='leave'||m.statut==='mission')break;days++;start=ds;}d.setDate(d.getDate()-1);}return {days,start};}
function absInRange(id,a,b){let n=0;eachDay(a,b,ds=>{if(ds>TODAY)return;const reg=regimeFor(ds);if(reg.actif===false)return;const r=(DB.pointages[ds]||{})[id];const m=metrics(r,ds);if(m.statut==='absent')n++;});return n;}
function renderAbsences(m){
  if(!ABS_FROM){ABS_FROM=TODAY.slice(0,7)+'-01';ABS_TO=TODAY;}
  const nowAll=DB.employees.map(e=>({e,st:absStreak(e.id)})).filter(x=>x.st.days>0);
  const rangeAll=DB.employees.map(e=>({e,n:absInRange(e.id,ABS_FROM,ABS_TO)})).filter(x=>x.n>0);
  const totRange=rangeAll.reduce((s,x)=>s+x.n,0);
  m.innerHTML=topbar('Suivi des absences','Absences')+`<div class="page view active">
    <div class="kpis" style="grid-template-columns:repeat(4,1fr)">${kpi('Absentes aujourd\u2019hui',nowAll.length,'au '+fmtDate(TODAY),I.calx,'var(--absent)','var(--absent-bg)')}${kpi('Jours d\u2019absence',totRange,'sur la période',I.calx,'var(--late)','var(--late-bg)')}${kpi('Employées concernées',rangeAll.length,'sur la période',I.users,'var(--ink)','#eee9dd')}${kpi('Justificatifs',DB.absences.length,'enregistrés',I.doc,'var(--leave)','var(--leave-bg)')}</div>
    <div class="card" style="padding:14px 16px;margin-bottom:16px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
      <div class="field"><label>Du</label><input type="date" id="abFrom" value="${ABS_FROM}" onchange="setAbsRange()"></div>
      <div class="field"><label>Au</label><input type="date" id="abTo" value="${ABS_TO}" onchange="setAbsRange()"></div>
      <div class="field" style="flex:1;min-width:180px">${I.search}<input value="${window._absQ||''}" placeholder="Rechercher une employée…" oninput="window._absQ=this.value;fillAbsLists()"></div>
    </div>
    <div class="card tablecard" style="margin-bottom:16px"><div class="table-head">${I.warn}<h3>Actuellement absentes — depuis quand</h3><div class="spacer"></div><span style="font-size:12px;color:var(--muted)" id="nowCount"></span></div>
      <table class="tbl"><thead><tr><th>Employée</th><th>Absente depuis</th><th>Jours ouvrés</th><th>Dernière présence</th><th></th></tr></thead><tbody id="nowBody"></tbody></table></div>
    <div class="card tablecard" style="margin-bottom:16px"><div class="table-head">${I.calx}<h3>Absences sur la période — ${fmtDate(ABS_FROM)} → ${fmtDate(ABS_TO)}</h3><div class="spacer"></div><span style="font-size:12px;color:var(--muted)" id="rangeCount"></span></div>
      <table class="tbl"><thead><tr><th>Employée</th><th>Service</th><th>Jours absents</th><th></th></tr></thead><tbody id="rangeBody"></tbody></table></div>
    <div class="card tablecard"><div class="table-head">${I.doc}<h3>Justificatifs enregistrés</h3><div class="spacer"></div><div class="field">${I.filter}<select id="aFilt" onchange="fillAbs()"><option value="">Tous</option><option value="justifiée">Justifiés</option><option value="injustifiée">Injustifiés</option></select></div></div>
      <table class="tbl"><thead><tr><th>Employée</th><th>Type</th><th>Période</th><th>Jours</th><th>Statut</th><th>Note</th></tr></thead><tbody id="absBody"></tbody></table></div></div>`;
  fillAbsLists();fillAbs();
}
function fillAbsLists(){
  const q=(window._absQ||'').toLowerCase(),match=e=>!q||(e.prenom+' '+e.nom).toLowerCase().includes(q);
  const now=DB.employees.map(e=>({e,st:absStreak(e.id)})).filter(x=>x.st.days>0&&match(x.e)).sort((a,b)=>b.st.days-a.st.days);
  const range=DB.employees.map(e=>({e,n:absInRange(e.id,ABS_FROM,ABS_TO)})).filter(x=>x.n>0&&match(x.e)).sort((a,b)=>b.n-a.n);
  const nc=$('#nowCount');if(nc)nc.textContent=now.length+' employée(s)';
  const rc=$('#rangeCount');if(rc)rc.textContent=range.reduce((s,x)=>s+x.n,0)+' jour(s)';
  const nb=$('#nowBody');if(nb)nb.innerHTML=now.map(x=>{const lp=lastPresence(x.e.id);return `<tr><td>${empCell(x.e.id)}</td><td class="mono"><b>${fmtDate(x.st.start)}</b></td><td><b style="color:var(--absent)">${x.st.days} j</b></td><td class="mono" style="color:var(--muted)">${lp?fmtDate(lp):'—'}</td><td><span class="linkish" onclick="openProfile('${x.e.id}')">Fiche →</span></td></tr>`;}).join('')||'<tr><td colspan="5"><div class="empty">'+I.check+'<div>Aucune absente en cours ✓</div></div></td></tr>';
  const rb=$('#rangeBody');if(rb)rb.innerHTML=range.map(x=>`<tr><td>${empCell(x.e.id)}</td><td style="color:var(--muted)">${x.e.service||'—'}</td><td><b>${x.n}</b> j</td><td><span class="linkish" onclick="openProfile('${x.e.id}')">Fiche →</span></td></tr>`).join('')||'<tr><td colspan="4"><div class="empty">Aucune absence sur la période</div></td></tr>';
}
function fillAbs(){const f=($('#aFilt')||{}).value||'';const rows=DB.absences.filter(a=>!f||a.statut===f);
  $('#absBody').innerHTML=rows.map(a=>`<tr><td>${empCell(a.id)}</td><td>${a.type}</td><td class="mono">${fmtDate(a.debut)}${a.fin!==a.debut?' → '+fmtDate(a.fin):''}</td><td><b>${a.jours}</b> j</td><td><span class="tag ${a.statut==='justifiée'?'t-present':'t-absent'}">${a.statut}</span></td><td style="color:var(--muted);font-size:12px">${a.note||''}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">Aucun justificatif enregistré</div></td></tr>';
}

  const totMin=lates.reduce((s,l)=>s+l.min,0);
  const[a,b]=monthBounds(TODAY.slice(0,7));const rank=summarize(a,b).filter(s=>s.rt>0).sort((x,y)=>y.rt-x.rt);
  m.innerHTML=topbar('Ponctualité','Retards')+`<div class="page view active">
    <div class="kpis" style="grid-template-columns:repeat(4,1fr)">${kpi('Retards du jour',lates.length,'après '+S().heureDebut,I.late,'var(--late)','var(--late-bg)')}${kpi('Minutes perdues',totMin,'cumul du jour',I.clock,'var(--absent)','var(--absent-bg)')}${kpi('Retards / mois',rank.reduce((s,x)=>s+x.rt,0),'mois en cours',I.late,'var(--ink)','#eee9dd')}${kpi('Tolérance',S().toleranceRetard+' min','seuil paramétré',I.gear,'var(--gold)','var(--gold-soft)')}</div>
    <div class="split"><div class="card tablecard"><div class="table-head">${I.late}<h3>Retards du jour</h3></div>
      <table class="tbl"><thead><tr><th>Employée</th><th>Arrivée</th><th>Retard</th></tr></thead><tbody>${lates.length?lates.sort((x,y)=>y.min-x.min).map(l=>`<tr><td>${empCell(l.id)}</td><td class="mono">${l.heure}</td><td><b style="color:var(--late)">+${l.min} min</b></td></tr>`).join(''):'<tr><td colspan="3"><div class="empty">Aucun retard ✓</div></td></tr>'}</tbody></table></div>
      <div class="card tablecard"><div class="table-head">${I.warn}<h3>Classement du mois</h3></div>
      <table class="tbl"><thead><tr><th>#</th><th>Employée</th><th>Retards</th><th>Alerte</th></tr></thead><tbody>${rank.slice(0,8).map((x,i)=>`<tr><td class="mono">${i+1}</td><td>${empCell(x.e.id)}</td><td><b>${x.rt}</b></td><td>${x.rt>=3?'<span class="tag t-absent">Seuil dépassé</span>':'<span class="tag t-present">OK</span>'}</td></tr>`).join('')||'<tr><td colspan="4"><div class="empty">Aucun retard ce mois</div></td></tr>'}</tbody></table></div></div></div>`;
}

function computeAlerts(){
  const al=[];DB.employees.forEach(e=>{const b=new Date(e.naissance);
    if(b.getMonth()===today.getMonth())al.push({type:'Anniversaire',ic:I.cake,col:'var(--leave)',bg:'var(--leave-bg)',txt:e.prenom+' '+e.nom,sub:'Anniversaire le '+pad(b.getDate())+'/'+pad(b.getMonth()+1),when:'Ce mois'});
    if(e.contrat!=='CDI'&&anciennete(e.embauche)<0.6){const fin=new Date(e.embauche);fin.setMonth(fin.getMonth()+(e.contrat.includes('IVP')?12:6));const dl=Math.round((fin-today)/864e5);if(dl>0&&dl<60)al.push({type:'Fin de période',ic:I.briefcase,col:'var(--late)',bg:'var(--late-bg)',txt:e.prenom+' '+e.nom,sub:'Fin '+e.contrat+' dans '+dl+' j',when:dl+' j'})}
    const docs=DB.documents.filter(d=>d.id===e.id).map(d=>d.type);if(!docs.some(t=>t.includes('Contrat')))al.push({type:'Document manquant',ic:I.warn,col:'var(--absent)',bg:'var(--absent-bg)',txt:e.prenom+' '+e.nom,sub:'Contrat absent du dossier',when:'À régulariser'});
  });
  DB.absences.filter(a=>a.statut==='injustifiée'&&a.debut===TODAY).forEach(a=>al.push({type:'Absence injustifiée',ic:I.warn,col:'var(--absent)',bg:'var(--absent-bg)',txt:empName(a.id),sub:'Non signalée aujourd\u2019hui',when:'Aujourd\u2019hui'}));
  return al;
}
function alertRow(a){return `<div class="alert-row"><div class="ai" style="background:${a.bg};color:${a.col}">${a.ic}</div><div class="txt"><b>${a.txt} — ${a.type}</b><small>${a.sub}</small></div><div class="when">${a.when}</div></div>`}
function renderAlertes(m){
  const al=computeAlerts(),g={};al.forEach(a=>(g[a.type]=g[a.type]||[]).push(a));
  m.innerHTML=topbar('Notifications','Alertes intelligentes ('+al.length+')')+`<div class="page view active">
    <div class="kpis" style="grid-template-columns:repeat(4,1fr)">${kpi('Total',al.length,'actives',I.bell,'var(--thread)','var(--absent-bg)')}${kpi('Docs manquants',(g['Document manquant']||[]).length,'dossiers',I.doc,'var(--absent)','var(--absent-bg)')}${kpi('Anniversaires',(g['Anniversaire']||[]).length,'ce mois',I.cake,'var(--leave)','var(--leave-bg)')}${kpi('Contrats',(g['Fin de période']||[]).length,'échéances',I.briefcase,'var(--late)','var(--late-bg)')}</div>
    <div class="card tablecard"><div class="table-head">${I.bell}<h3>Toutes les alertes</h3></div>${al.length?al.map(alertRow).join(''):'<div class="empty">'+I.check+'<div>Aucune alerte</div></div>'}</div></div>`;
}

function renderRSE(m){

  m.innerHTML=topbar('Responsabilité sociétale','RSE & bien-être',`<button class="btn btn-ghost" onclick="exportRSE()">${I.download} Rapport RSE</button>`)+`<div class="page view active">
    <div class="rse-grid">${rse('Féminisation',femP+'%',femP,'Majorité féminine')}${rse('Âge moyen',ageMoy+' ans',ageMoy/60*100,'Pyramide équilibrée')}${rse('Ancienneté moyenne',ancMoy+' ans',ancMoy/15*100,'Fidélisation')}${rse('Absentéisme',taux+'%',100-taux*8,'Objectif < 5%')}${rse('Emplois CDI',cdi+'%',cdi,'Sécurité emploi')}${rse('Personnel formé',Math.round(formP)+'%',formP,'Bac et +')}${rse('Turn-over',(100/E.length).toFixed(1)+'%',90,'Faible rotation')}${rse('Parité encadrement','50%',50,'Mixité postes clés')}</div>
    <div class="split"><div class="card chartcard"><h3>Répartition par âge</h3><div class="csub">Pyramide</div><div class="chart-wrap"><canvas id="cAge"></canvas></div></div><div class="card chartcard"><h3>Par ancienneté</h3><div class="csub">Séniorité</div><div class="chart-wrap"><canvas id="cAnc"></canvas></div></div></div>
    <div class="card" style="margin-top:16px;padding:18px 20px;display:flex;gap:14px;align-items:center"><div class="ai" style="width:42px;height:42px;border-radius:12px;background:var(--gold-soft);color:var(--gold);display:grid;place-items:center;flex:none">${I.leaf}</div><div style="flex:1;font-size:13px;color:var(--muted)"><b style="color:var(--text)">Conformité RSE clients.</b> Indicateurs exportables (CSV/Excel) pour Gérard Darel, Claudie Pierlot, Ba&sh, Vanessa Bruno…</div><button class="btn btn-gold" onclick="exportRSE()">${I.download} Exporter</button></div></div>`;
  drawAge();drawAnc();
}
function rse(l,v,p,n){return `<div class="rse-card"><div class="rl">${l}</div><div class="rv">${v}</div><div class="rb"><i style="width:${Math.min(100,Math.max(6,p))}%"></i></div><div class="progress-note">${n}</div></div>`}
function exportRSE(){const E=DB.employees;const rows=[['Indicateur RSE','Valeur'],['Effectif',E.length],['Féminisation',Math.round(E.filter(e=>e.sexe==='F').length/E.length*100)+'%'],['Âge moyen',(E.reduce((s,e)=>s+age(e.naissance),0)/E.length).toFixed(1)+' ans'],['Ancienneté moyenne',(E.reduce((s,e)=>s+anciennete(e.embauche),0)/E.length).toFixed(1)+' ans'],['Absentéisme',(DB.absences.reduce((s,a)=>s+a.jours,0)/(E.length*125)*100).toFixed(1)+'%'],['CDI',Math.round(E.filter(e=>e.contrat==='CDI').length/E.length*100)+'%']];csvDL('rapport_RSE_'+TODAY+'.csv',rows);toast('Rapport RSE exporté')}

/* ============================================================ ASSISTANT IA === */
const SUG=['Qui est en retard aujourd\u2019hui ?','Heures travaillées de Salma ce mois ?','Combien d\u2019heures sup. au total ce mois ?','Qui a +10 ans d\u2019ancienneté ?','Anniversaires du mois ?'];
function renderAssistant(m){
  m.innerHTML=topbar('Intelligence RH','Assistant IA')+`<div class="page view active">
    <div class="suggest">${SUG.map(s=>`<button onclick="askAI('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')}</div>
    <div class="ai-wrap"><div class="ai-stream" id="aiStream">${aiHistory.length?aiHistory.map(renderMsg).join(''):`<div class="ai-msg bot"><div class="b-av">${I.spark}</div><div class="ai-bubble"><p><strong>Bonjour 👋 Assistant RH DBS Fashion.</strong></p><p>Posez une question sur le personnel : présences, heures, retards, paie, ancienneté… Je réponds à partir de la base.</p></div></div>`}</div>
    <div class="ai-input"><textarea id="aiInput" rows="1" placeholder="Votre question…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();askAI()}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea><button class="btn btn-gold" onclick="askAI()" style="height:42px">${I.send}</button></div></div></div>`;
  const s=$('#aiStream');s.scrollTop=s.scrollHeight;
}
function renderMsg(msg){return `<div class="ai-msg ${msg.role==='user'?'user':'bot'}"><div class="b-av">${msg.role==='user'?initials(ROLE):I.spark}</div><div class="ai-bubble">${formatMD(msg.content)}</div></div>`}
function formatMD(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>').split(/\n\n+/).map(p=>p.startsWith('<ul>')?p:'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('')}
function aiContext(){
  const[a,b]=monthBounds(TODAY.slice(0,7));const sum=summarize(a,b);
  const E=DB.employees.map(e=>{const s=sum.find(x=>x.e.id===e.id);return `${e.prenom} ${e.nom} | ${e.poste} | ${e.categorie} | ${age(e.naissance)}ans | anc ${anciennete(e.embauche).toFixed(1)}ans | ${e.contrat} | né ${e.naissance} | mois: ${s.jT}j trav, ${fr2(hDec(s.hN+s.hS))}h, ${fr2(hDec(s.hS))}h sup, ${s.rt} retards, ${s.jA} abs`}).join('\n');
  const r=dayRec(TODAY)||{};const att=DB.employees.map(e=>{const mm=metrics(r[e.id]);return `${e.prenom} ${e.nom}: ${STATUT_TAG[mm.statut][1]}${r[e.id]&&r[e.id].entree?' ('+r[e.id].entree+')':''}`}).join('\n');
  return `DONNÉES RH — DBS Fashion (usine textile). Date: ${TODAY}. Paramètres: début ${S().heureDebut}, fin ${S().heureFin}, tolérance ${S().toleranceRetard}min, délai H.sup ${S().graceHS}min. Ouvrières payées en heures, cadres en jours.\n\nEMPLOYÉES (synthèse mois en cours):\n${E}\n\nPOINTAGE DU JOUR:\n${att}`;
}
async function askAI(preset){
  const input=$('#aiInput');const q=preset||(input?input.value.trim():'');if(!q)return;if(input){input.value='';input.style.height='auto'}
  aiHistory.push({role:'user',content:q});const s=$('#aiStream');
  s.insertAdjacentHTML('beforeend',renderMsg({role:'user',content:q}));
  s.insertAdjacentHTML('beforeend',`<div class="ai-msg bot" id="aiPending"><div class="b-av">${I.spark}</div><div class="ai-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`);
  s.scrollTop=s.scrollHeight;
  try{
    const sys='Tu es l\u2019assistant RH de DBS Fashion. Réponds en français, concis et factuel, à partir des données fournies uniquement. Gras (**) pour les chiffres clés, listes (- ) si utile.\n\n'+aiContext();
    const res=await callClaude(aiHistory.slice(-6).map(m=>({role:m.role,content:m.content})),sys);
    $('#aiPending')?.remove();aiHistory.push({role:'assistant',content:res});s.insertAdjacentHTML('beforeend',renderMsg({role:'assistant',content:res}));
  }catch(err){$('#aiPending')?.remove();const fb=localAnswer(q);aiHistory.push({role:'assistant',content:fb});s.insertAdjacentHTML('beforeend',renderMsg({role:'assistant',content:fb}))}
  s.scrollTop=s.scrollHeight;
}
function localAnswer(q){
  const l=q.toLowerCase(),r=dayRec(TODAY)||{};
  if(l.includes('retard')&&l.includes('aujourd')){const x=DB.employees.filter(e=>metrics(r[e.id]).statut==='late');return x.length?'**'+x.length+'** en retard :\n'+x.map(e=>'- '+e.prenom+' '+e.nom+' ('+r[e.id].entree+')').join('\n'):'Aucun retard aujourd\u2019hui.'}
  if(l.includes('anniversaire')){const b=DB.employees.filter(e=>new Date(e.naissance).getMonth()===today.getMonth());return b.length?'Anniversaires :\n'+b.map(e=>'- '+e.prenom+' '+e.nom).join('\n'):'Aucun ce mois.'}
  if(l.includes('ancienneté')||l.includes('10 ans')){const n=DB.employees.filter(e=>anciennete(e.embauche)>=10);return '**'+n.length+'** ont +10 ans :\n'+n.map(e=>'- '+e.prenom+' ('+ancLabel(e.embauche)+')').join('\n')}
  if(l.includes('sup')){const[a,b]=monthBounds(TODAY.slice(0,7));const t=summarize(a,b).reduce((s,x)=>s+x.hS,0);return 'Total heures supplémentaires ce mois : **'+fr2(hDec(t))+' h**.'}
  return '_(Mode hors-ligne — ajoutez une clé API dans Sécurité & accès pour des réponses complètes.)_';
}

/* ============================================================ SÉCURITÉ ======= */
const ROLES={'Administrateur':'Accès total.','Ressources Humaines':'RH complet : personnel, présences, documents, congés, paie.','Direction':'Consultation et rapports.','Chef d\u2019atelier':'Consultation limitée à son équipe.'};
const AUDIT=[['Olfa Hamdi','Validation congé · Salma Ben Ali','2026-06-19 08:12'],['Système','Import pointage Face ID (18 lignes)','2026-06-19 07:40'],['IA','Certificat médical classé · Ines Gharbi','2026-06-19 08:05'],['Système','Sauvegarde automatique','2026-06-19 06:00']];
function renderParametres(m){
  m.innerHTML=topbar('Administration','Sécurité & accès',`<button class="btn btn-ghost" onclick="openSettings()">${I.gear} Paramètres horaires</button>`)+`<div class="page view active"><div class="split"><div>
    ${usersCard()}
    <div class="card tablecard"><div class="table-head">${I.clock}<h3>Historique des modifications</h3></div><table class="tbl"><thead><tr><th>Auteur</th><th>Action</th><th>Horodatage</th></tr></thead><tbody id="auditBody"><tr><td colspan="3"><div class="empty">Chargement…</div></td></tr></tbody></table></div></div>
    <div><div class="card chartcard" style="margin-bottom:16px"><h3>Espace salarié · QR codes</h3><div class="csub" style="margin-top:6px">Chaque ouvrière consulte son pointage du mois (présences, retards, absences) en scannant son QR personnel puis en saisissant son code à 4 chiffres. Lecture seule.</div><button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:12px" onclick="window.open('/api/qr-codes.pdf','_blank')">${I.download} QR codes du personnel (PDF)</button><div style="font-size:11.5px;color:var(--faint);margin-top:10px">Imprimez et distribuez les cartes (confidentiel : chaque carte porte le code de l\u2019employée). Lien de l\u2019espace : <span class="mono">${location.origin}/moi</span></div></div><div class="card chartcard" style="margin-bottom:16px"><h3>Clé API Anthropic (optionnelle)</h3><div class="csub" style="margin-top:6px">La clé est configurée côté serveur (variable d\u2019environnement ANTHROPIC_API_KEY). Ce champ est informatif.</div><input id="apiKeyInput" type="password" placeholder="sk-ant-..." value="${apiKey}" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-top:12px;outline:none;font-family:var(--mono)"><button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px" onclick="saveApiKey()">${I.check} Enregistrer</button></div>
    <div class="card chartcard" style="margin-bottom:16px"><h3>Sauvegarde des données</h3><div class="csub" style="margin-top:6px">Sauvegarde auto quotidienne. Export/import manuel.</div><div style="display:flex;gap:10px;margin-top:12px"><button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="exportDB()">${I.download} Exporter</button><button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="document.getElementById('impDB').click()">${I.up} Importer</button><input type="file" id="impDB" accept=".json" style="display:none" onchange="importDB(this.files[0])"></div><button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:10px;color:var(--thread)" onclick="resetDB()">Réinitialiser la démo</button></div>
    <div class="card chartcard"><h3>Intégrations futures</h3><div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">${['Paie','Production textile (PilotPro)','Contrôle qualité','ERP usine'].map(x=>`<div style="display:flex;align-items:center;gap:9px;font-size:13px"><span class="dotmark" style="background:var(--gold)"></span>${x}<span class="tag t-neutral" style="margin-left:auto">À venir</span></div>`).join('')}</div></div></div></div></div>`;
  loadAudit();loadUsers();
}
function usersCard(){
  if(!can('users'))return `<div class="card tablecard" style="margin-bottom:16px"><div class="table-head">${I.shield}<h3>Votre accès</h3></div><div style="padding:6px 2px;color:var(--muted);font-size:13px">Connecté en tant que <b>${ME.nom}</b> — rôle <b>${ROLE_LABELS[ME.role]||ME.role}</b>. La gestion des comptes est réservée à l'administrateur.</div></div>`;
  return `<div class="card tablecard" style="margin-bottom:16px"><div class="table-head">${I.users}<h3>Comptes & rôles</h3></div>
    <table class="tbl"><thead><tr><th>Identifiant</th><th>Nom</th><th>Rôle</th><th></th></tr></thead><tbody id="usersBody"><tr><td colspan="4"><div class="empty">Chargement…</div></td></tr></tbody></table>
    <div style="border-top:1px dashed var(--line);margin-top:12px;padding-top:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input id="u_login" class="tinput" style="width:100%" placeholder="Identifiant">
        <input id="u_nom" class="tinput" style="width:100%" placeholder="Nom affiché">
        <select id="u_role" class="ssel">${Object.entries(ROLE_LABELS).map(([r,l])=>`<option value="${r}">${l}</option>`).join('')}</select>
        <input id="u_pass" type="password" class="tinput" style="width:100%" placeholder="Mot de passe">
      </div>
      <button class="btn btn-primary" style="margin-top:10px" onclick="saveUser()">${I.check} Ajouter / modifier</button>
      <div style="font-size:11.5px;color:var(--faint);margin-top:8px">Rôles : Administrateur (tout) · RH (tout sauf comptes) · Chef d'atelier (présences, sans paramètres ni suppression) · Lecture seule (consultation).</div>
    </div></div>`;
}
function loadUsers(){if(!can('users'))return;fetch('/api/users').then(r=>r.ok?r.json():Promise.reject()).then(us=>{const b=document.getElementById('usersBody');if(!b)return;
  b.innerHTML=us.map(u=>`<tr><td class="mono">${u.login}</td><td>${u.nom||''}</td><td>${ROLE_LABELS[u.role]||u.role}</td><td style="text-align:right"><span class="linkish" onclick="editUser('${u.login}','${(u.nom||'').replace(/'/g,"\\'")}','${u.role}')">Modifier</span>${u.login.toLowerCase()==='admin'?'':` · <span class="linkish" style="color:var(--thread)" onclick="delUser('${u.login}')">Suppr.</span>`}</td></tr>`).join('')||'<tr><td colspan="4"><div class="empty">Aucun compte</div></td></tr>';
}).catch(()=>{const b=document.getElementById('usersBody');if(b)b.innerHTML='<tr><td colspan="4"><div class="empty">Disponible sur le serveur déployé</div></td></tr>';});}
function editUser(login,nom,role){$('#u_login').value=login;$('#u_nom').value=nom;$('#u_role').value=role;$('#u_pass').value='';$('#u_pass').placeholder='Nouveau mot de passe (vide = inchangé)';}
function saveUser(){const login=$('#u_login').value.trim(),nom=$('#u_nom').value.trim(),role=$('#u_role').value,password=$('#u_pass').value;if(!login){toast('Identifiant requis','warn');return;}
  fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,nom,role,password})}).then(r=>r.json()).then(d=>{if(d.error){toast(d.error,'warn');return;}toast('Compte enregistré');$('#u_login').value='';$('#u_nom').value='';$('#u_pass').value='';loadUsers();}).catch(()=>toast('Erreur','warn'));}
function delUser(login){if(!confirm('Supprimer le compte « '+login+' » ?'))return;fetch('/api/users/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login})}).then(r=>r.json()).then(d=>{if(d.error){toast(d.error,'warn');return;}toast('Compte supprimé');loadUsers();}).catch(()=>toast('Erreur','warn'));}
function saveApiKey(){apiKey=$('#apiKeyInput').value.trim();localStorage.setItem('pilotrh_apikey',apiKey);toast(apiKey?'Clé enregistrée':'Clé supprimée')}
function exportDB(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='pilotrh_sauvegarde_'+TODAY+'.json';a.click();toast('Base exportée')}
function importDB(f){if(!f)return;const r=new FileReader();r.onload=e=>{try{DB=JSON.parse(e.target.result);persistAll();render();toast('Base importée')}catch(x){toast('Fichier invalide','warn')}};r.readAsText(f)}

/* ============================================================ GRAPHIQUES ===== */
const HAS_CHART=typeof Chart!=='undefined';
if(HAS_CHART){Chart.defaults.font.family="'Inter',sans-serif";Chart.defaults.color='#6c7180';}
function destroy(k){if(charts[k])charts[k].destroy()}
function drawAbs(){const c=document.getElementById('cAbs');if(!c||!HAS_CHART)return;destroy('abs');charts.abs=new Chart(c,{type:'line',data:{labels:ABS_HISTORY.map(x=>x.m),datasets:[{data:ABS_HISTORY.map(x=>x.taux),borderColor:'#c19a3e',backgroundColor:'rgba(193,154,62,.12)',fill:true,tension:.4,borderWidth:2.5,pointBackgroundColor:'#c19a3e',pointRadius:4}]},options:chOpts({suffix:'%'})})}
function drawServ(){const c=document.getElementById('cServ');if(!c||!HAS_CHART)return;destroy('serv');const d=SERVICES.map(s=>DB.employees.filter(e=>e.service===s).length);charts.serv=new Chart(c,{type:'doughnut',data:{labels:SERVICES,datasets:[{data:d,backgroundColor:['#b1432d','#c19a3e','#2f8f5b','#4f66c2','#7d5fa8','#0d8a8a','#a8553e'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{boxWidth:9,boxHeight:9,padding:10,font:{size:11}}}}}})}
function drawDocs(){const c=document.getElementById('cDocs');if(!c||!HAS_CHART)return;destroy('docs');const t={};DB.documents.forEach(d=>t[d.type]=(t[d.type]||0)+1);charts.docs=new Chart(c,{type:'bar',data:{labels:Object.keys(t),datasets:[{data:Object.values(t),backgroundColor:'#c19a3e',borderRadius:6,barThickness:22}]},options:chOpts({horizontal:true})})}
function drawAge(){const c=document.getElementById('cAge');if(!c||!HAS_CHART)return;destroy('age');const d=[0,0,0,0];DB.employees.forEach(e=>{const a=age(e.naissance);d[a<25?0:a<35?1:a<45?2:3]++});charts.age=new Chart(c,{type:'bar',data:{labels:['<25','25-34','35-44','45+'],datasets:[{data:d,backgroundColor:['#e9dcb6','#c19a3e','#a8553e','#b1432d'],borderRadius:6,barThickness:40}]},options:chOpts({})})}
function drawAnc(){const c=document.getElementById('cAnc');if(!c||!HAS_CHART)return;destroy('anc');const d=[0,0,0,0];DB.employees.forEach(e=>{const a=anciennete(e.embauche);d[a<2?0:a<5?1:a<10?2:3]++});charts.anc=new Chart(c,{type:'bar',data:{labels:['<2 ans','2-5','5-10','10+'],datasets:[{data:d,backgroundColor:'#4f66c2',borderRadius:6,barThickness:40}]},options:chOpts({})})}
function chOpts(o){return{responsive:true,maintainAspectRatio:false,indexAxis:o.horizontal?'y':'x',plugins:{legend:{display:false}},scales:{x:{grid:{display:false},border:{display:false}},y:{grid:{color:'#efebe0'},border:{display:false},ticks:{callback:v=>v+(o.suffix||'')}}}}}

/* ============================================================ DIVERS ========= */
function sortBy(scope,k){const c=SORT[scope];SORT[scope]=(c&&c.k===k)?{k,dir:-c.dir}:{k,dir:1};({pers:fillPers,pres:fillPres}[scope]||(()=>render()))()}
function openModal(html,cls=''){const o=$('#overlay');o.innerHTML='<div class="modal '+cls+'">'+html+'</div>';o.classList.add('open');o.onclick=e=>{if(e.target===o)closeModal()}}
function closeModal(){$('#overlay').classList.remove('open');$('#overlay').innerHTML=''}
function quickSearch(v){if(!v||v.length<2)return}
function fileToB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f)})}
function parseJSON(t){let s=t.replace(/```json/g,'').replace(/```/g,'').trim();const a=s.indexOf('{'),b=s.lastIndexOf('}');if(a>=0&&b>=0)s=s.slice(a,b+1);return JSON.parse(s)}
async function callClaude(messages,system){
  const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages,system})});
  if(!r.ok)throw new Error('API '+r.status);return (await r.json()).text;
}

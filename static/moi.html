<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Mon pointage — DBS Fashion</title>
<style>
:root{--ink:#1a1d29;--gold:#c19a3e;--gold-soft:#f6efdd;--paper:#faf8f3;--surface:#fff;
  --line:#e7e1d4;--muted:#6c7180;--faint:#9aa0ad;--present:#2e7d54;--present-bg:#e6f3ec;
  --late:#b9842b;--late-bg:#fbf2df;--absent:#b23b3b;--absent-bg:#f8e7e7;--leave:#3b6db2;--leave-bg:#e7eef8;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;
  line-height:1.5;padding-bottom:40px}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
header{background:var(--ink);color:#fff;padding:22px 0 26px;border-bottom:3px solid var(--gold)}
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700}
.brand{font-size:21px;font-weight:700;margin-top:3px}
.sub{font-size:12.5px;color:#c7cad3;margin-top:2px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px;
  box-shadow:0 1px 2px rgba(26,29,41,.04)}
h2{font-size:13px;letter-spacing:.04em;margin:0 0 12px;color:var(--ink)}
.pin-in{width:100%;font-size:30px;letter-spacing:14px;text-align:center;padding:14px;border:1.5px solid var(--line);
  border-radius:13px;outline:none;font-weight:700;color:var(--ink)}
.pin-in:focus{border-color:var(--gold)}
.btn{display:block;width:100%;background:var(--gold);color:#fff;border:none;border-radius:13px;padding:14px;
  font-size:15px;font-weight:700;margin-top:14px;cursor:pointer}
.btn:active{opacity:.9}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600}
.who{display:flex;align-items:center;gap:13px}
.av{width:48px;height:48px;border-radius:50%;background:var(--gold-soft);color:var(--gold);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0}
.who .nm{font-size:17px;font-weight:700}
.who .ct{font-size:12.5px;color:var(--muted)}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
.kpi{border:1px solid var(--line);border-radius:13px;padding:13px 14px;background:var(--surface)}
.kpi .v{font-size:23px;font-weight:700;line-height:1}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px}
.kpi.good .v{color:var(--present)} .kpi.warn .v{color:var(--late)} .kpi.bad .v{color:var(--absent)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);
  padding:8px 6px;border-bottom:1px solid var(--line)}
td{padding:9px 6px;border-bottom:1px solid #f1ece1}
.mono{font-variant-numeric:tabular-nums}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.t-present{background:var(--present-bg);color:var(--present)}
.t-late{background:var(--late-bg);color:var(--late)}
.t-absent{background:var(--absent-bg);color:var(--absent)}
.t-leave{background:var(--leave-bg);color:var(--leave)}
.muted{color:var(--muted)} .center{text-align:center}
.err{background:var(--absent-bg);color:var(--absent);border-radius:11px;padding:11px 13px;font-size:13px;margin-top:12px}
.note{font-size:11.5px;color:var(--faint);margin-top:10px}
textarea,select{width:100%;border:1px solid var(--line);border-radius:11px;padding:11px;font-size:14px;outline:none;font-family:inherit}
textarea:focus,select:focus{border-color:var(--gold)}
.foot{text-align:center;font-size:11px;color:var(--faint);margin-top:22px}
.hidden{display:none}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:11px;font-size:13.5px;opacity:0;transition:opacity .25s;z-index:9}
.toast.show{opacity:1}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="eyebrow">DBS Fashion</div>
  <div class="brand">Mon pointage</div>
  <div class="sub">Présences, retards et absences du mois</div>
</div></header>

<div class="wrap" id="app"><div class="card center muted">Chargement…</div></div>
<div class="toast" id="toast"></div>

<script>
const params=new URLSearchParams(location.search);
const TOKEN=params.get('t')||'';
const app=document.getElementById('app');
let DATA=null;

const pad=n=>String(n).padStart(2,'0');
const toMin=t=>{if(!t)return null;const p=t.split(':');return (+p[0])*60+(+p[1]);};
const hLabel=m=>Math.floor(m/60)+'h'+pad(Math.round(m%60));
const fr2=n=>(Math.round(n*100)/100).toString().replace('.',',');
const hDec=m=>m/60;
const JJ=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function S(){return DATA?DATA.settings:{};}
function regimeFor(ds){
  const s=S();const w=new Date(ds+'T12:00').getDay();
  if(s.periodes)for(const p of s.periodes){if(p.du<=ds&&ds<=p.au){const r=(p.jours||{})[w];return r||{actif:false};}}
  return (s.jours||{})[w]||{actif:true,debut:'07:30',fin:'16:30',pause:30,tol:15,grace:15};
}
function shiftYm(ym,delta){let a=ym.split('-'),Y=+a[0],M=+a[1]+delta;while(M<1){M+=12;Y--;}while(M>12){M-=12;Y++;}return Y+'-'+pad(M);}
function roundMin(x,step,sens){if(!step||step<=0)return x;return sens==='inferieur'?Math.floor(x/step)*step:Math.round(x/step)*step;}
function badges(rec){let P=(rec.punches&&rec.punches.length)?rec.punches.slice():[rec.entree,rec.sortie];return P.map(toMin).filter(x=>x!=null).sort((a,b)=>a-b);}
function metrics(rec,date){
  const reg=regimeFor(date);
  if(!rec||rec.statut==='absent')return{statut:'absent',worked:false,heures:0,retard:0,hs:0,late:false};
  if(['leave','mission'].includes(rec.statut)&&!rec.entree)return{statut:rec.statut,worked:false,heures:0,retard:0,hs:0,late:false};
  const P=badges(rec);let heures=0,retard=0,hs=0,late=false,coupures=false,revue=false;
  if(P.length){const firstIn=P[0],lastOut=P[P.length-1];
    if(reg.actif===false){hs=Math.max(0,lastOut-firstIn-(+reg.pause||0));}
    else{const debut=toMin(reg.debut),fin=toMin(reg.fin),grace=+reg.grace||0,tol=+reg.tol||0,pause=+reg.pause||0;
      late=firstIn>debut+tol;retard=late?(firstIn-debut):0;
      if(P.length>=2){let segs=[];
        if(P.length%2===0){for(let i=0;i+1<P.length;i+=2)segs.push([P[i],P[i+1]]);coupures=P.length>2;}
        else{segs=[[firstIn,lastOut]];revue=true;}
        let norm=0;for(const s of segs){const a=Math.max(s[0],debut),b=Math.min(s[1],fin);if(b>a)norm+=b-a;}
        let gaps=0;for(let i=0;i+1<segs.length;i++){const g0=Math.max(segs[i][1],debut),g1=Math.min(segs[i+1][0],fin);if(g1>g0)gaps+=g1-g0;}
        norm-=Math.max(0,pause-gaps);heures=Math.max(0,norm);
        if(lastOut>=fin+grace){hs=(S().modeHS==='fin')?(lastOut-fin):(lastOut-(fin+grace));}hs=Math.max(0,hs);}}}
  const ar=+S().arrondi||0;if(ar>0){heures=roundMin(heures,ar,S().arrondiSens);hs=roundMin(hs,ar,S().arrondiSens);}
  if(rec.hM!=null&&rec.hM!=='')heures=+rec.hM;
  let statut=rec.statut==='present'?(late?'late':'present'):rec.statut;
  return{statut,worked:true,heures,retard,hs,late,coupures,revue};
}

function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

let PIN='';
async function fetchMe(pin,mois){
  const r=await fetch('/api/me?t='+encodeURIComponent(TOKEN)+'&pin='+encodeURIComponent(pin||'')+'&mois='+encodeURIComponent(mois||''));
  if(r.status===200)return{ok:true,data:await r.json()};
  const j=await r.json().catch(()=>({}));
  return{ok:false,status:r.status,need_pin:j.need_pin,error:j.error};
}
async function loadMonth(ym){const res=await fetchMe(PIN,ym);if(res.ok){DATA=res.data;render();}else toast('Impossible de charger ce mois');}

function pinScreen(msg){
  app.innerHTML=`<div class="card">
    <h2>Code d'accès</h2>
    <p class="muted" style="margin:0 0 14px;font-size:13.5px">Saisissez votre code à 4 chiffres (remis avec votre QR code).</p>
    <input class="pin-in" id="pin" type="tel" inputmode="numeric" maxlength="4" placeholder="••••">
    ${msg?`<div class="err">${msg}</div>`:''}
    <button class="btn" id="go">Voir mon pointage</button>
    <div class="note">Vos informations sont strictement personnelles et confidentielles.</div>
  </div>`;
  const inp=document.getElementById('pin');inp.focus();
  const submit=async()=>{const v=inp.value.trim();if(v.length<4){toast('4 chiffres requis');return;}
    document.getElementById('go').textContent='…';
    const res=await fetchMe(v);
    if(res.ok){PIN=v;DATA=res.data;render();}
    else pinScreen('Code incorrect. Réessayez.');};
  document.getElementById('go').onclick=submit;
  inp.onkeydown=e=>{if(e.key==='Enter')submit()};
  inp.oninput=()=>{if(inp.value.length===4)submit()};
}

function summary(){
  const j=DATA.jours, ym=DATA.mois, today=DATA.today;
  const a=ym.split('-'),Y=+a[0],M=+a[1];const dim=new Date(Y,M,0).getDate();
  let trav=0,abs=0,conge=0,retN=0,retMin=0,hN=0,hS=0;const lines=[];
  for(let d=1;d<=dim;d++){
    const ds=ym+'-'+pad(d);if(ds>today)break;const reg=regimeFor(ds);const rec=j[ds];const m=metrics(rec,ds);
    let label;
    if(rec){
      if(m.statut==='absent'){if(reg.actif===false)continue;abs++;label='absent';}
      else if(m.statut==='leave'||m.statut==='mission'){conge++;label='leave';}
      else{trav++;if(m.late){retN++;retMin+=m.retard;}hN+=m.heures;hS+=m.hs;label=m.statut;}
    }else{
      if(reg.actif===false)continue;
      abs++;label='absent';
    }
    lines.push({ds,d,m,rec:rec||{},label});
  }
  return{trav,abs,conge,retN,retMin,hN,hS,lines};
}

function render(){
  const s=summary();
  const ym=DATA.mois.split('-');const moisTxt=MOIS[+ym[1]-1]+' '+ym[0];
  const ini=((DATA.prenom||' ')[0]||'')+((DATA.nom||' ')[0]||'');
  const tagTxt={present:['Présente','t-present'],late:['Retard','t-late'],absent:['Absente','t-absent'],leave:['Congé','t-leave']};
  const rows=s.lines.slice().reverse().map(l=>{
    const tg=tagTxt[l.label]||['—',''];const w=new Date(l.ds+'T12:00').getDay();
    const showT=l.label==='present'||l.label==='late';
    return `<tr>
      <td class="mono">${pad(l.d)}/${ym[1]} <span class="muted">${JJ[w]}</span></td>
      <td><span class="tag ${tg[1]}">${tg[0]}</span></td>
      <td class="mono">${showT?(l.rec.entree||'—'):'—'}</td>
      <td class="mono">${showT?(l.rec.sortie||'—'):'—'}${(l.rec.punches&&l.rec.punches.length>2)?` <span title="Badges : ${l.rec.punches.join(' · ')}" style="cursor:help;color:var(--gold)">⇄</span>`:''}</td>
      <td class="mono">${l.m.heures?hLabel(l.m.heures):'—'}</td>
      <td class="mono">${l.m.retard?'+'+l.m.retard:'—'}</td>
      <td class="mono">${l.m.hs?hLabel(l.m.hs):'—'}</td>
    </tr>`;}).join('');
  const curYm=DATA.today.slice(0,7),prevYm=shiftYm(curYm,-1);
  app.innerHTML=`
  <div style="display:flex;gap:8px;margin-top:16px">
    <button onclick="loadMonth('${curYm}')" style="flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);font-weight:700;font-size:13.5px;cursor:pointer;${DATA.mois===curYm?'background:var(--ink);color:#fff;border-color:var(--ink)':'background:var(--surface);color:var(--ink)'}">Ce mois</button>
    <button onclick="loadMonth('${prevYm}')" style="flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);font-weight:700;font-size:13.5px;cursor:pointer;${DATA.mois===prevYm?'background:var(--ink);color:#fff;border-color:var(--ink)':'background:var(--surface);color:var(--ink)'}">Mois précédent</button>
  </div>
  <div class="card">
    <div class="who"><div class="av">${ini.toUpperCase()}</div>
      <div><div class="nm">${DATA.prenom} ${DATA.nom}</div>
      <div class="ct">Matricule ${DATA.matricule}${DATA.categorie?' · '+DATA.categorie:''} · ${moisTxt}</div></div></div>
    <div class="kpis">
      <div class="kpi good"><div class="v">${s.trav}</div><div class="l">Jours travaillés</div></div>
      <div class="kpi ${s.retN?'warn':''}"><div class="v">${s.retN}</div><div class="l">Retards (${s.retMin} min)</div></div>
      <div class="kpi ${s.abs?'bad':''}"><div class="v">${s.abs}</div><div class="l">Absences</div></div>
      <div class="kpi"><div class="v">${fr2(hDec(s.hN+s.hS))}<span style="font-size:13px"> h</span></div><div class="l">Heures du mois${s.hS?' (dont '+fr2(hDec(s.hS))+'h sup)':''}</div></div>
    </div>
  </div>
  <div class="card">
    <h2>Détail jour par jour — ${moisTxt}</h2>
    <table><thead><tr><th>Date</th><th>Statut</th><th>Entrée</th><th>Sortie</th><th>Heures</th><th>Retard</th><th>H.sup</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="7" class="center muted">Aucun pointage ce mois-ci</td></tr>'}</tbody></table>
    <div class="note">Heures comptées selon l'horaire de l'usine. L'avance avant l'heure de début n'est pas comptée ; les heures sup. sont calculées au-delà de l'heure de fin.</div>
  </div>
  <div class="card">
    <h2>Une erreur dans votre pointage ?</h2>
    <select id="fday"><option value="">Choisir le jour concerné…</option>${s.lines.slice().reverse().map(l=>`<option value="${l.ds}">${pad(l.d)}/${ym[1]} ${JJ[new Date(l.ds+'T12:00').getDay()]}</option>`).join('')}</select>
    <textarea id="fmsg" rows="3" style="margin-top:9px" placeholder="Décrivez l'erreur (ex. j'étais présente mais marquée absente)"></textarea>
    <button class="btn btn-ghost" id="fsend">Signaler aux RH</button>
    <div class="note">Votre signalement est transmis au service RH avec votre nom. Il ne modifie pas automatiquement le pointage.</div>
  </div>
  <div class="foot">PilotRH · DBS Fashion — espace salarié</div>`;
  document.getElementById('fsend').onclick=async()=>{
    const date=document.getElementById('fday').value;const message=document.getElementById('fmsg').value.trim();
    if(!message){toast('Décrivez l\u2019erreur');return;}
    document.getElementById('fsend').textContent='…';
    try{const r=await fetch('/api/me/flag?t='+encodeURIComponent(TOKEN),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,message})});
      if(r.ok){toast('Signalement envoyé aux RH');document.getElementById('fmsg').value='';}
      else toast('Échec de l\u2019envoi');}
    catch(e){toast('Connexion impossible');}
    document.getElementById('fsend').textContent='Signaler aux RH';
  };
}

(async function init(){
  if(!TOKEN){app.innerHTML='<div class="card err">Lien invalide. Scannez votre QR code personnel.</div>';return;}
  const res=await fetchMe('');
  if(res.ok){DATA=res.data;render();}
  else if(res.need_pin)pinScreen('');
  else app.innerHTML='<div class="card err">Lien invalide ou expiré. Demandez votre QR code au service RH.</div>';
})();
</script>
</body>
</html>
